name: X-HAL
options:
  bundleIdPrefix: com.xhal
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

packages:
  HotKey:
    url: https://github.com/soffes/HotKey
    from: "0.2.1"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ARCHS: "$(ARCHS_STANDARD)"
  configs:
    Release:
      ONLY_ACTIVE_ARCH: "NO"

targets:
  X-HAL:
    type: application
    platform: macOS
    sources:
      - path: X-HAL
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.xhal.breathwork
        PRODUCT_NAME: X-HAL
        INFOPLIST_FILE: X-HAL/Info.plist
        CODE_SIGN_ENTITLEMENTS: X-HAL/X-HAL.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: "YES"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
    dependencies:
      - package: HotKey
    entitlements:
      path: X-HAL/X-HAL.entitlements
